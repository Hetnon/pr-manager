runtime: nodejs20
env: standard
service: api  # back-end

instance_class: F1
automatic_scaling:
  min_instances: 0
  max_instances: 5
  target_cpu_utilization: 0.65

# NPM_CONFIG_PRODUCTION=false makes npm install include devDependencies,
# so tsx + typescript are present at runtime (entrypoint runs TS directly via tsx).
env_variables:
  NODE_ENV: 'production'
  NPM_CONFIG_PRODUCTION: 'false'
  PORT: '8080'

handlers:
  - url: /.*
    secure: always
    script: auto
