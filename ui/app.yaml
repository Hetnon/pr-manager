runtime: nodejs20
env: standard
service: default  # front-end

instance_class: F1
automatic_scaling:
  min_instances: 0
  max_instances: 5
  target_cpu_utilization: 0.65

# All handlers are static_files, so App Engine doesn't need an entrypoint.
handlers:
  - url: /(.*\.(json|ico|js|css|html|png|jpg|jpeg|gif|svg|webp|woff|woff2|ttf|map))$
    static_files: public/\1
    upload: public/.*\.(json|ico|js|css|html|png|jpg|jpeg|gif|svg|webp|woff|woff2|ttf|map)$
    secure: always

  # SPA fallback: any other path serves index.html
  - url: /.*
    static_files: public/index.html
    upload: public/index.html
    secure: always
